# prefix キーを Ctrl+t に変更（screen の escape t と同等）
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# repeat-time を 1000ms に変更
set -g repeat-time 1000

# 画面分割
bind - split-window -v
bind | split-window -h

# ペイン移動（vim スタイル）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（prefix + Shift+矢印、連続入力可）
bind -r S-Left  resize-pane -L 1
bind -r S-Right resize-pane -R 1
bind -r S-Up    resize-pane -U 1
bind -r S-Down  resize-pane -D 1
