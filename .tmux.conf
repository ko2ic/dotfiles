# prefix キーを Ctrl+t に変更（screen の escape t と同等）
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# repeat-time を 1000ms に変更
set -g repeat-time 1000

# 画面分割
bind - split-window -v
bind | split-window -h

# ペイン移動（vim スタイル）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（prefix + Shift+矢印、連続入力可）
bind -r S-Left  resize-pane -L 1
bind -r S-Right resize-pane -R 1
bind -r S-Up    resize-pane -U 1
bind -r S-Down  resize-pane -D 1

# ベルが鳴ったウィンドウをステータスバーでハイライト
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off
set -g window-status-bell-style 'fg=white,bg=red,bold'

# ウィンドウ・ペイン切り替え時に Claude hook のハイライトをリセット
# Claude の Stop/Notification hook (.claude/settings.json) がペイン背景色と
# ステータスバーを変更するため、ペイン切り替え時にデフォルトに戻す
set-hook -g after-select-window "set-window-option window-status-style default; set-option -p window-style 'bg=default'; set-option -p window-active-style 'bg=default'"
set-hook -g after-select-pane "set-window-option window-status-style default; set-option -p window-style 'bg=default'; set-option -p window-active-style 'bg=default'"

# ウィンドウ名をカレントディレクトリのベースネームに自動追従
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
